<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>単語再認テスト</title>

  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <!-- ボタン回答プラグイン -->
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
  <style>

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: white;
    }

    /* 画面中央配置 */

    .jspsych-display-element {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      width: 100vw;
      height: 100vh;
    }

    .center-text {
      width: 100%;
      text-align: center;
      font-family: sans-serif;
    }

  </style>

</head>

<body></body>

<script>

/* ========================================
   GASのURL
======================================== */

/* ↓ここを自分のURLに変更 */

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbykXLPo7yOkRlGzwbBA8leKtM4_Qqq_wF9uLB9GwVDpDaYfkJb47is2StaHIp-OLpiR/exec"
/* ========================================
   jsPsych 初期化
======================================== */

const jsPsych = initJsPsych();

const DAY = 5;

let timeline = [];
let participant_id = "";

timeline.push({

  type: jsPsychSurveyText,

  questions: [

    {
      prompt: "ユーザーID（半角数字4桁）を入力してください",
      required: true
    }

  ],

  button_label: "次へ",

  on_finish: function(data){

    participant_id =
      data.response.Q0;

  }

});

/* ========================================
   教示画面
======================================== */

timeline.push({

  type: jsPsychHtmlButtonResponse,

  stimulus: `
    <div class="center-text"
         style="font-size:25px; line-height:1.8;">
      これから単語が表示されます。<br>
      各単語について、<br>
      「見た」または「見てない」を選択してください。
    </div>
  `,

  choices: ['開始する']

});

/* ========================================
   テスト単語
======================================== */

let test_words = [
{item_id:121, word:"離婚", old_new:"old", correct_answer:0, valence:2.2, arousal:4.8, emotion:"negative"},
{item_id:122, word:"粗野", old_new:"old", correct_answer:0, valence:2.9, arousal:3.3, emotion:"negative"},
{item_id:123, word:"飢餓", old_new:"old", correct_answer:0, valence:2.0, arousal:3.5, emotion:"negative"},
{item_id:124, word:"狂人", old_new:"old", correct_answer:0, valence:2.1, arousal:5.2, emotion:"negative"},
{item_id:125, word:"詐欺", old_new:"old", correct_answer:0, valence:2.1, arousal:5.5, emotion:"negative"},
{item_id:126, word:"歴史", old_new:"old", correct_answer:0, valence:5.4, arousal:3.3, emotion:"neutral"},
{item_id:127, word:"住民", old_new:"old", correct_answer:0, valence:5.1, arousal:2.3, emotion:"neutral"},
{item_id:128, word:"幼児", old_new:"old", correct_answer:0, valence:5.7, arousal:3.0, emotion:"neutral"},
{item_id:129, word:"瞬間", old_new:"old", correct_answer:0, valence:5.2, arousal:3.2, emotion:"neutral"},
{item_id:130, word:"笑止", old_new:"old", correct_answer:0, valence:3.9, arousal:3.9, emotion:"neutral"},
{item_id:131, word:"動物", old_new:"old", correct_answer:0, valence:6.1, arousal:4.2, emotion:"positive"},
{item_id:132, word:"庭園", old_new:"old", correct_answer:0, valence:6.0, arousal:3.0, emotion:"positive"},
{item_id:133, word:"純真", old_new:"old", correct_answer:0, valence:6.6, arousal:3.9, emotion:"positive"},
{item_id:134, word:"美人", old_new:"old", correct_answer:0, valence:7.6, arousal:5.8, emotion:"positive"},
{item_id:135, word:"音楽", old_new:"old", correct_answer:0, valence:7.6, arousal:5.9, emotion:"positive"},

{item_id:136, word:"破滅", old_new:"new", correct_answer:1, valence:2.0, arousal:5.1, emotion:"negative"},
{item_id:137, word:"重荷", old_new:"new", correct_answer:1, valence:2.0, arousal:3.5, emotion:"negative"},
{item_id:138, word:"退屈", old_new:"new", correct_answer:1, valence:2.0, arousal:1.3, emotion:"negative"},
{item_id:139, word:"堕落", old_new:"new", correct_answer:1, valence:2.3, arousal:4.4, emotion:"negative"},
{item_id:140, word:"監獄", old_new:"new", correct_answer:1, valence:2.2, arousal:4.0, emotion:"negative"},
{item_id:141, word:"承認", old_new:"new", correct_answer:1, valence:5.5, arousal:3.2, emotion:"neutral"},
{item_id:142, word:"支配", old_new:"new", correct_answer:1, valence:3.5, arousal:4.6, emotion:"neutral"},
{item_id:143, word:"用事", old_new:"new", correct_answer:1, valence:4.1, arousal:2.7, emotion:"neutral"},
{item_id:144, word:"卒業", old_new:"new", correct_answer:1, valence:4.7, arousal:5.2, emotion:"neutral"},
{item_id:145, word:"海岸", old_new:"new", correct_answer:1, valence:5.5, arousal:3.6, emotion:"neutral"},
{item_id:146, word:"砂糖", old_new:"new", correct_answer:1, valence:6.0, arousal:3.4, emotion:"positive"},
{item_id:147, word:"敏速", old_new:"new", correct_answer:1, valence:6.0, arousal:4.2, emotion:"positive"},
{item_id:148, word:"解放", old_new:"new", correct_answer:1, valence:6.1, arousal:5.2, emotion:"positive"},
{item_id:149, word:"豊富", old_new:"new", correct_answer:1, valence:7.2, arousal:4.0, emotion:"positive"},
{item_id:150, word:"相棒", old_new:"new", correct_answer:1, valence:6.6, arousal:4.4, emotion:"positive"}
];

/* ========================================
   ランダム化
======================================== */

test_words =
  jsPsych.randomization.shuffle(test_words);

/* ========================================
   テストフェーズ
======================================== */

test_words.forEach(function(item){

  timeline.push({

    type: jsPsychHtmlButtonResponse,

    stimulus: `
      <div class="center-text"
           style="font-size:100px;">
        ${item.word}
      </div>
    `,

    choices: ['見た', '見てない'],
    post_trial_gap: 300,

    /* 保存データ */

    data: {
      item_id: item.item_id,
      word: item.word,
      old_new: item.old_new,
      correct_answer: item.correct_answer,
      valence: item.valence,
      arousal: item.arousal,
      emotion: item.emotion

    },

    /* 回答後処理 */

    on_finish: function(data){

      /* 正答判定 */

      data.correct =
        data.response == data.correct_answer;

      /* ------------------------
         Googleスプレッドシート送信
      ------------------------ */

fetch(GAS_URL, {
  method: "POST",
  mode: "no-cors",
  keepalive: true,
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify({  type: "recognition",
    participant_id: participant_id,
    day: DAY,
    item_id: data.item_id,
    word: data.word,
    old_new: data.old_new,
    valence: data.valence,
    arousal: data.arousal,
    emotion: data.emotion,
    response: data.response,
    correct_answer: data.correct_answer,
    correct: data.correct,
    rt: data.rt
  })
});

    }

  });

});

/* ========================================
   終了画面
======================================== */

timeline.push({

  type: jsPsychHtmlKeyboardResponse,

  stimulus: `
  <div class="center-text"
         style="font-size:18px; line-height:1.8;">
      ご協力ありがとうございました。<br><br>
      <b>ブラウザの「戻る」操作を行い、<br>
        前のアンケート画面に戻ってください。</b><br>
      （戻るボタンやスワイプ操作など、<br>
      お使いの端末の方法をご利用ください。）<br>  
      ※ページを閉じたり、×ボタンを押したり<br>
      しないでください。<br><br>
      アンケート画面に戻りましたら、<br>
      「次へ」を押して回答を続けてください。<br>
    </div>
  `,

  choices: "NO_KEYS"

});

/* ========================================
   実行
======================================== */

jsPsych.run(timeline);

</script>

</html>
